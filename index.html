

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Marine & Weather Forecast - Multiple Points</title>

<style>
body { font-family: Arial, sans-serif; padding: 20px; }

table {
  border-collapse: collapse;
  margin-top: 20px;
  font-size: 14px;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

th { background: #f4f4f4; }

.multi-column {
  display: inline-block;
  margin-right: 10px;
  vertical-align: top;
}

canvas {
  display:block;
  margin:5px auto;
}
</style>
</head>

<body>

<h2>Marine & Weather Forecast - Multiple Points</h2>

<div id="derivedSummary">Loading derived tables...</div>
<div id="summary">Loading summary tables...</div>
<div id="hourly">Loading hourly tables...</div>

<script>

// ================= POINTS =================
const points = {
  "A": [24.5, 66.5],
  "B": [23.5, 65.5],
  "C": [24.5, 64.0],
  "D": [23.5, 64.0],
  "E": [24.5, 62.0],
  "F": [23.5, 62.0],
  "E2": [24.5, 61.0],
  "F2": [23.5, 61.0]
};

const periods = [
  { label: "00–12 UTC", startHour: 0, duration: 12 },
  { label: "12–24 UTC", startHour: 12, duration: 12 },
  { label: "Next 24h", startHour: 0, duration: 24, offsetDays: 1 },
  { label: "Following 24h", startHour: 0, duration: 24, offsetDays: 2 }
];

const derivedTableKeys = [
  "Wind direction","Wind speed & gust","Weather","Visibility",
  "Sea state","Swell height","Period","Swell direction",
  "Avg Pressure","Temperature","Humidity"
];

// ================= FETCH =================
async function fetchData(lat, lon){
  const w = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,wind_speed_10m,wind_gusts_10m,wind_direction_10m,relative_humidity_2m,surface_pressure,weathercode&forecast_days=3&timezone=UTC`;

  const m = `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=swell_wave_height,swell_wave_direction,swell_wave_period&forecast_days=3&timezone=UTC`;

  const [r1,r2] = await Promise.all([fetch(w), fetch(m)]);
  return { weatherData: await r1.json(), waveData: await r2.json() };
}

// ================= HELPERS =================
function avg(a){ return (a.reduce((x,y)=>x+y,0)/a.length).toFixed(2); }
function min(a){ return Math.min(...a).toFixed(2); }
function max(a){ return Math.max(...a).toFixed(2); }

function range(a){
  return `${min(a)} - ${max(a)}`;
}

function circularMean(d){
  const r=d.map(x=>x*Math.PI/180);
  const s=r.reduce((a,b)=>a+Math.sin(b),0);
  const c=r.reduce((a,b)=>a+Math.cos(b),0);
  let m=Math.atan2(s/d.length,c/d.length)*180/Math.PI;
  return m<0?m+360:m;
}

function deg16(d){
  const c=["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
  return c[Math.floor(((d+11.25)%360)/22.5)];
}

function extreme(a){
  const s=[...a].sort((x,y)=>x-y);
  let g=-1,i=0;
  for(let j=0;j<s.length;j++){
    const n=(j+1)%s.length;
    const gap=(s[n]-s[j]+360)%360;
    if(gap>g){g=gap;i=n;}
  }
  return [s[i],s[(i-1+s.length)%s.length]];
}

function pad3(d){
  d=((d%360)+360)%360;
  return String(Math.round(d)).padStart(3,"0");
}

function knots(v){ return (v/1.852).toFixed(1); }

function getIdx(t,h,d,o=0){
  let s=t.findIndex(x=>parseInt(x.split("T")[1])===h);
  if(s<0)s=0;
  s+=o*24;
  return [...Array(d)].map((_,i)=>s+i);
}

// ================= WIND COMPASS =================
function drawWindCompass(canvasId, avgDeg, minDeg, maxDeg, hours){
  const canvas=document.getElementById(canvasId);
  if(!canvas) return;

  const ctx=canvas.getContext("2d");
  const center=40;
  const radius=30;

  ctx.clearRect(0,0,80,80);

  ctx.beginPath();
  ctx.arc(center,center,radius,0,2*Math.PI);
  ctx.stroke();

  if(hours?.length){
    const maxSpeed=Math.max(...hours.map(h=>h.speed||1));

    hours.forEach(h=>{
      const intensity=(h.speed||1)/maxSpeed;
      const shade=Math.floor(50+205*intensity);

      const a=(h.dir-90)*Math.PI/180;
      const x=center+Math.cos(a)*(radius-10);
      const y=center+Math.sin(a)*(radius-10);

      ctx.strokeStyle=`rgb(${shade},${shade},${shade})`;
      ctx.beginPath();
      ctx.moveTo(center,center);
      ctx.lineTo(x,y);
      ctx.stroke();
    });
  }

  const s=(minDeg-90)*Math.PI/180;
  const e=(maxDeg-90)*Math.PI/180;

  ctx.beginPath();
  ctx.moveTo(center,center);
  ctx.arc(center,center,radius-5,s,e);
  ctx.fillStyle="rgba(173,216,230,0.3)";
  ctx.fill();

  function arrow(d,color){
    const a=(d-90)*Math.PI/180;
    ctx.beginPath();
    ctx.moveTo(center,center);
    ctx.lineTo(
      center+Math.cos(a)*(radius-5),
      center+Math.sin(a)*(radius-5)
    );
    ctx.strokeStyle=color;
    ctx.lineWidth=2;
    ctx.stroke();
  }

  arrow(avgDeg,"blue");
  arrow(minDeg,"black");
  arrow(maxDeg,"black");
}

// ================= DERIVED + SUMMARY TABLE =================
function buildTable(name,w,wv,type){

  const t=w.hourly.time;
  const temp=w.hourly.temperature_2m;
  const ws=w.hourly.wind_speed_10m;
  const wg=w.hourly.wind_gusts_10m;
  const wd=w.hourly.wind_direction_10m;
  const rh=w.hourly.relative_humidity_2m;
  const pr=w.hourly.surface_pressure;
  const wc=w.hourly.weathercode;

  const wh=wv.hourly.swell_wave_height;
  const wp=wv.hourly.swell_wave_period;
  const wdir=wv.hourly.swell_wave_direction;

  const weatherMap={
    0:"Clear",1:"Mainly clear",2:"Partly cloudy",3:"Cloudy",
    45:"Fog",48:"Fog",51:"Drizzle",53:"Drizzle",55:"Drizzle",
    61:"Rain",63:"Rain",65:"Heavy rain",80:"Showers",95:"Thunderstorm"
  };

  let html=`<div class="multi-column"><h3>${type} - ${name}</h3><table><tr><th>Param</th>`;

  periods.forEach(p=>html+=`<th>${p.label}</th>`);
  html+=`</tr>`;

  derivedTableKeys.forEach(k=>{
    html+=`<tr><td>${k}</td>`;

    periods.forEach(p=>{
      const idx=getIdx(t,p.startHour,p.duration,p.offsetDays||0);

      if(k==="Wind direction"){
        const ang=idx.map(i=>wd[i]);
        const avg=circularMean(ang);
        const [mn,mx]=extreme(ang);

        const id=`${type}_${name}_${p.label}`;

        html+=`<td>
          <canvas id="${id}" width="80" height="80"></canvas><br>
          ${deg16(avg)} (${pad3(avg)})
        </td>`;

        setTimeout(()=>{
          drawWindCompass(
            id,
            avg,
            mn,
            mx,
            idx.map(i=>({dir:wd[i],speed:ws[i]}))
          );
        },0);
      }

      else if(k==="Wind speed & gust"){
       const a=idx.map(i=>Math.round(ws[i]));
	const g=idx.map(i=>Math.round(wg[i]));
	html+=`<td>${Math.min(...a)}-${Math.max(...a)} KT / ${Math.max(...g)} KT</td>`;
      }

      else if(k==="Weather"){
        html+=`<td>${weatherMap[wc[idx[0]]]}</td>`;
      }

      else if(k==="Visibility"){
        html+=`<td>${weatherMap[wc[idx[0]]]}</td>`;
      }

      else if(k==="Sea state"){
        html+=`<td>-</td>`;
      }

      else if(k==="Swell height"){
        const a=idx.map(i=>wh[i]);
        html+=`<td>${avg(a)}</td>`;
      }

      else if(k==="Period"){
        const a=idx.map(i=>wp[i]);
        html+=`<td>${avg(a)}</td>`;
      }

      else if(k==="Swell direction"){
        const a=idx.map(i=>wdir[i]);
        html+=`<td>${deg16(circularMean(a))}</td>`;
      }

      else if(k==="Avg Pressure"){
        const a=idx.map(i=>pr[i]);
        html+=`<td>${avg(a)} (${range(a)})</td>`;
      }

      else if(k==="Temperature"){
        const a=idx.map(i=>temp[i]);
        html+=`<td>${avg(a)} (${range(a)})</td>`;
      }

      else if(k==="Humidity"){
       const a=idx.map(i=>rh[i]);

	html+=`<td>
	${Math.round(avg(a))} (${Math.round(Math.min(...a))} - ${Math.round(Math.max(...a))})
	</td>`;
      }
    });

    html+=`</tr>`;
  });

  html+=`</table></div>`;
  return html;
}

// ================= HOURLY TABLE (FIXED) =================
function buildHourlyTable(name,w,wv){

  const t=w.hourly.time;
  const temp=w.hourly.temperature_2m;
  const ws=w.hourly.wind_speed_10m;
  const wg=w.hourly.wind_gusts_10m;
  const wd=w.hourly.wind_direction_10m;
  const rh=w.hourly.relative_humidity_2m;
  const pr=w.hourly.surface_pressure;
  const wc=w.hourly.weathercode;

  const wh=wv.hourly.swell_wave_height;
  const wp=wv.hourly.swell_wave_period;
  const wdir=wv.hourly.swell_wave_direction;

  const weatherMap={
    0:"Clear",1:"Mainly clear",2:"Partly cloudy",3:"Cloudy",
    45:"Fog",48:"Fog",51:"Drizzle",53:"Drizzle",55:"Drizzle",
    61:"Rain",63:"Rain",65:"Heavy rain",80:"Showers",95:"Thunderstorm"
  };

  let html=`<h3>Hourly Table - ${name}</h3>
  <table>
  <tr>
    <th>Time</th><th>Wind</th><th>Speed</th><th>Gust</th>
    <th>Weather</th><th>Visibility</th><th>Sea</th>
    <th>Swell H</th><th>Period</th><th>Swell Dir</th>
    <th>Pressure</th><th>Temp</th><th>Humidity</th>
  </tr>`;

  for(let i=0;i<t.length;i++){
    html+=`<tr>
      <td>${t[i]}</td>
      <td>${deg16(wd[i])} (${Math.round(wd[i])}°)</td>
      <td>${knots(ws[i])}</td>
      <td>${knots(wg[i])}</td>
      <td>${weatherMap[wc[i]]}</td>
      <td>${weatherMap[wc[i]]}</td>
      <td>-</td>
      <td>${wh[i]}</td>
      <td>${wp[i]}</td>
      <td>${deg16(wdir[i])}</td>
      <td>${pr[i]}</td>
      <td>${temp[i]}</td>
      <td>${rh[i]}</td>
    </tr>`;
  }

  html+=`</table>`;
  return html;
}

// ================= RUN =================
async function run(){
  const all=[];
  for(const [n,c] of Object.entries(points)){
    const d=await fetchData(c[0],c[1]);
    all.push({n,...d});
  }

  document.getElementById("derivedSummary").innerHTML=
    all.map(x=>buildTable(x.n,x.weatherData,x.waveData,"DERIVED")).join("");

  document.getElementById("summary").innerHTML=
    all.map(x=>buildTable(x.n,x.weatherData,x.waveData,"SUMMARY")).join("");

  document.getElementById("hourly").innerHTML=
    all.map(x=>buildHourlyTable(x.n,x.weatherData,x.waveData)).join("");
}

run();
</script>

</body>
</html>
